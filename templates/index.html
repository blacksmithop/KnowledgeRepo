<!DOCTYPE html>
<html lang="en">
<head>
    <!-- START: Head Section -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Repo</title>
    <link href="{{ url_for('static', path='/assets/css/styles.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="path-to-default-icon/favicon.ico"> <!-- Update with a default icon -->
    <!-- END: Head Section -->
</head>
<body>
    <!-- START: Header Section -->
    <header>
        <h1>Knowledge Repo</h1>
        <nav>
            <button class="dropdown-btn">
                <i class="fas fa-bars"></i> <!-- FontAwesome icon for menu -->
            </button>
            <div class="dropdown-content">
                <a href="#profile">Profile</a>
                <a href="#logout">Logout</a>
            </div>
        </nav>
    </header>
    <!-- END: Header Section -->

    <!-- START: Main Content Section -->
    <main>
        <div class="search-container">
            <button id="add-button">Add</button>
            <input type="text" id="search-input" placeholder="Enter search query...">
            <button id="search-button">Search</button>
        </div>
        <div id="search-results" class="hidden"></div>
    </main>
    <!-- END: Main Content Section -->

    <!-- START: Add Category Modal -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Add New Category</h2>
            <form id="add-category-form">
                <label for="name">Name:</label>
                <input type="text" id="name" required>
                
                <label for="description">Description:</label>
                <textarea id="description" required></textarea>
                
                <label for="example-title">Example Title:</label>
                <input type="text" id="example-title" required>
                
                <label for="example-code">Example Code:</label>
                <textarea id="example-code" required></textarea>
                
                <label for="favicon">Favicon URL:</label>
                <input type="url" id="favicon" placeholder="http://example.com/favicon.ico" required>
                
                <button type="submit">Add Category</button>
            </form>
        </div>
    </div>
    <!-- END: Add Category Modal -->

    <!-- START: Chatbot Section -->
    <div id="chat-icon">
        <i class="fas fa-comments"></i>
    </div>

    <div id="chatbot-container" class="hidden">
        <div class="chatbot-header">
            <h3>Chatbot</h3>
            <span class="close-chatbot">&times;</span>
        </div>
        <div class="chatbot-body" id="chatbot-body">
            <div class="bot-message">Hi! How can I assist you today?</div>
        </div>
        <div class="chatbot-footer">
            <input type="text" id="chat-input" placeholder="Type your message...">
            <button id="send-button"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <!-- END: Chatbot Section -->

    <!-- START: Footer Section -->
    <footer>
        <p>Knowledge Repo © 2024</p>
    </footer>
    <!-- END: Footer Section -->

    <!-- START: JavaScript Link -->
    <script src="{{ url_for('static', path='/assets/js/script.js') }}"></script>
    <!-- END: JavaScript Link -->
</body>
</html>
